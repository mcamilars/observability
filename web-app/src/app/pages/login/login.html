<section class="acceso">
  <div class="acceso__tarjeta">
    <a routerLink="/" class="acceso__volver">← Volver al catálogo</a>

    <h2>{{ modo() === 'login' ? 'Iniciar sesión' : 'Crear cuenta' }}</h2>

    <div class="acceso__tabs" role="tablist">
      <button type="button" class="acceso__tab" [class.acceso__tab--activo]="modo() === 'login'" (click)="cambiarModo('login')">
        Ingresar
      </button>
      <button type="button" class="acceso__tab" [class.acceso__tab--activo]="modo() === 'registro'" (click)="cambiarModo('registro')">
        Registrarme
      </button>
    </div>

    <form class="formulario" [formGroup]="formulario" (ngSubmit)="enviar()">
      @if (modo() === 'registro') {
        <div class="campo">
          <label for="nombre">Nombre</label>
          <input id="nombre" type="text" formControlName="nombre" autocomplete="name"/>
        </div>
      }

      <div class="campo">
        <label for="email">Correo</label>
        <input id="email" type="email" formControlName="email" autocomplete="email"/>
      </div>

      <div class="campo">
        <label for="password">Contraseña</label>
        <input id="password" type="password" formControlName="password" autocomplete="current-password"/>
      </div>

      @if (error()) {
        <p class="formulario__error">{{ error() }}</p>
      }

      <button type="submit" class="boton boton--primario boton--bloque" [disabled]="enviando()">
        {{ enviando() ? 'Procesando…' : (modo() === 'login' ? 'Ingresar' : 'Crear cuenta') }}
      </button>
    </form>

    <p class="acceso__nota">
      Las contraseñas no se encriptan: es un entorno de taller, no de producción.
    </p>
  </div>
</section>
