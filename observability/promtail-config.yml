# Promtail recoge los logs de todos los contenedores y los envía a Loki.
# Descubre los contenedores por el socket de Docker, así que no hay que
# configurar nada al instrumentar un servicio nuevo.

server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: contenedores
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      # Nombre del contenedor (sin la barra inicial).
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      # Nombre del servicio en docker-compose -> etiqueta `service`.
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
